name: Security Scan (Vibe Guard)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  vibe-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vibe Guard CLI
        run: npm install -g @vibe-guard/cli

      - name: Run security scan (fail on medium+)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p reports
          vibe-guard scan . --fail-on medium --format json --output reports/vibe-guard-report.json
          node scripts/vibe-guard-report.mjs reports/vibe-guard-report.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vibe-guard-report
          path: reports/vibe-guard-report.json
